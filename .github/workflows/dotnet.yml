name: .NET Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Account Info demo
        run: dotnet restore "Account Info (WinForms)/accountinfo.csproj"

      - name: Build Account Info demo
        run: dotnet build "Account Info (WinForms)/accountinfo.csproj" --configuration Release

      - name: Verify build output
        run: |
          if (Test-Path "Account Info (WinForms)\bin\Release\net6.0-windows\accountinfo.dll") {
            Write-Output 'Build succeeded.'
          } else {
            Write-Error 'Expected build output not found.'
          }
        shell: powershell
